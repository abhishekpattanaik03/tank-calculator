<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Dip Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #111820;
    --border: #1e3a4a;
    --accent: #00d4ff;
    --accent2: #ff6b00;
    --text: #c8dde8;
    --muted: #4a6878;
    --green: #00ff88;
    --red: #ff3355;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,212,255,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,212,255,0.03) 40px);
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    width: 100%;
    max-width: 900px;
  }

  .logo-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 6px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 12px rgba(0,212,255,0.3);
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fff;
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 16px auto;
    max-width: 600px;
    opacity: 0.4;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }

  .tank-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .tank-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0.6;
  }

  .tank-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(0,212,255,0.12);
  }

  .tank-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .tank-id {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 8px rgba(0,212,255,0.4);
  }

  .tank-cap {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.5;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .dip-label {
    font-size: 0.72rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="number"] {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    padding: 12px 50px 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0,212,255,0.2);
  }

  .unit-badge {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .result-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 68px;
    transition: all 0.3s;
  }

  .result-box.has-value {
    border-color: rgba(0,255,136,0.3);
    background: rgba(0,255,136,0.04);
  }

  .result-box.error {
    border-color: rgba(255,51,85,0.3);
    background: rgba(255,51,85,0.04);
  }

  .result-label {
    font-size: 0.68rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .result-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.8rem;
    color: var(--green);
    text-align: right;
    text-shadow: 0 0 10px rgba(0,255,136,0.4);
    transition: all 0.2s;
  }

  .result-value.error {
    color: var(--red);
    font-size: 1rem;
    text-shadow: none;
  }

  .result-value.empty {
    color: var(--muted);
    font-size: 1rem;
  }

  .result-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .fill-bar-wrap {
    margin-top: 12px;
  }

  .fill-bar-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
  }

  .fill-bar {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  .fill-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 3px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 6px rgba(0,255,136,0.5);
  }

  .fill-bar-inner.warning {
    background: linear-gradient(90deg, var(--accent2), var(--red));
    box-shadow: 0 0 6px rgba(255,51,85,0.5);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.active {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .footer {
    margin-top: 28px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-align: center;
  }

  .interp-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--accent);
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  @media (max-width: 500px) {
    h1 { font-size: 1.6rem; letter-spacing: 2px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

const TANKS = ['TK01', 'TK02', 'R180', 'R222'];

function getVolume(tank, dipCm) {
  const table = CALIB[tank];
  if (!table || table.length === 0) return null;
  const minDip = table[0][0];
  const maxDip = table[table.length - 1][0];
  if (dipCm < minDip) return { vol: 0, pct: 0, interp: false, outRange: false };
  if (dipCm > maxDip) return { vol: null, pct: null, interp: false, outRange: true };

  // Binary search
  let lo = 0, hi = table.length - 1;
  while (lo < hi - 1) {
    const mid = Math.floor((lo + hi) / 2);
    if (table[mid][0] <= dipCm) lo = mid; else hi = mid;
  }
  const [d0, v0] = table[lo];
  const [d1, v1] = table[hi];
  let vol, interp = false;
  if (d0 === dipCm) {
    vol = v0;
  } else if (d1 === dipCm) {
    vol = v1;
  } else {
    vol = v0 + (v1 - v0) * (dipCm - d0) / (d1 - d0);
    interp = true;
  }
  const maxVol = table[table.length - 1][1];
  const pct = maxVol > 0 ? (vol / maxVol * 100) : 0;
  return { vol, pct, interp, outRange: false };
}

function buildCard(tank) {
  const table = CALIB[tank];
  const maxDip = table[table.length - 1][0];
  const maxVol = table[table.length - 1][1];

  const card = document.createElement('div');
  card.className = 'tank-card';
  card.id = `card-${tank}`;

  card.innerHTML = `
    <div class="tank-header">
      <div>
        <span class="status-dot" id="dot-${tank}"></span>
        <span class="tank-id">${tank}</span>
      </div>
      <div class="tank-cap">
        MAX DIP: ${maxDip} cm<br>
        CAPACITY: ${maxVol.toLocaleString()} L
      </div>
    </div>
    <div class="dip-label">Enter Dip Reading</div>
    <div class="input-row">
      <div class="input-wrap">
        <input type="number" id="inp-${tank}" min="0" max="${maxDip}" step="0.1"
          placeholder="0.0" inputmode="decimal"
          aria-label="${tank} dip reading in centimetres"/>
        <span class="unit-badge">cm</span>
      </div>
    </div>
    <div class="result-box" id="res-${tank}">
      <div>
        <div class="result-label">Volume</div>
        <div class="result-unit">Litres</div>
      </div>
      <div style="text-align:right">
        <div class="result-value empty" id="val-${tank}">—</div>
        <div id="badge-${tank}"></div>
      </div>
    </div>
    <div class="fill-bar-wrap">
      <div class="fill-bar-label">
        <span>FILL LEVEL</span>
        <span id="pct-${tank}">0%</span>
      </div>
      <div class="fill-bar"><div class="fill-bar-inner" id="bar-${tank}"></div></div>
    </div>
  `;

  const inp = card.querySelector(`#inp-${tank}`);
  inp.addEventListener('input', () => updateTank(tank));

  return card;
}

function updateTank(tank) {
  const raw = document.getElementById(`inp-${tank}`).value.trim();
  const card = document.getElementById(`card-${tank}`);
  const resBox = document.getElementById(`res-${tank}`);
  const valEl = document.getElementById(`val-${tank}`);
  const dot = document.getElementById(`dot-${tank}`);
  const bar = document.getElementById(`bar-${tank}`);
  const pctEl = document.getElementById(`pct-${tank}`);
  const badge = document.getElementById(`badge-${tank}`);

  if (raw === '' || raw === null) {
    valEl.textContent = '—';
    valEl.className = 'result-value empty';
    resBox.className = 'result-box';
    card.className = 'tank-card';
    dot.className = 'status-dot';
    bar.style.width = '0%';
    bar.className = 'fill-bar-inner';
    pctEl.textContent = '0%';
    badge.innerHTML = '';
    return;
  }

  const dip = parseFloat(raw);
  if (isNaN(dip) || dip < 0) {
    valEl.textContent = 'Invalid';
    valEl.className = 'result-value error';
    resBox.className = 'result-box error';
    badge.innerHTML = '';
    return;
  }

  const result = getVolume(tank, dip);

  if (result.outRange) {
    valEl.textContent = 'Out of Range';
    valEl.className = 'result-value error';
    resBox.className = 'result-box error';
    dot.className = 'status-dot';
    badge.innerHTML = '';
    bar.style.width = '0%';
    pctEl.textContent = '—';
    return;
  }

  card.className = 'tank-card active';
  dot.className = 'status-dot active';
  resBox.className = 'result-box has-value';
  valEl.className = 'result-value';
  valEl.textContent = result.vol.toLocaleString('en-IN', {maximumFractionDigits: 1});

  badge.innerHTML = result.interp ? '<span class="interp-badge">INTERPOLATED</span>' : '';

  const pct = Math.min(100, Math.max(0, result.pct));
  bar.style.width = pct + '%';
  bar.className = pct >= 90 ? 'fill-bar-inner warning' : 'fill-bar-inner';
  pctEl.textContent = pct.toFixed(1) + '%';
}

const grid = document.getElementById('tankGrid');
TANKS.forEach(t => grid.appendChild(buildCard(t)));
</script>
